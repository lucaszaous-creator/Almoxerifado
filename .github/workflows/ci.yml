name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  almoxpro-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ALMOXPRO.sln -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build ALMOXPRO.sln -p:EnableWindowsTargeting=true --no-restore --configuration Release

      - name: Testes
        run: dotnet test ALMOXPRO.Tests/ALMOXPRO.Tests.csproj -p:EnableWindowsTargeting=true --no-restore --configuration Release
